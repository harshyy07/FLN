<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Class 2 Math Practice Worksheet Generator</title>
<style>
  :root{
    --black:#000;
    --white:#fff;
    --gray:#555;
    --line:#000;
  }
  *{box-sizing:border-box;}
  body{
    font-family:Arial, Helvetica, sans-serif;
    background:#e9e9e9;
    color:#000;
    margin:0;
    padding:0;
  }
  .toolbar{
    background:#fff;
    border-bottom:2px solid #000;
    padding:14px 18px;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:14px;
    position:sticky;
    top:0;
    z-index:50;
  }
  .toolbar h1{
    font-size:18px;
    margin:0;
    margin-right:10px;
    letter-spacing:0.5px;
  }
  .toolbar label{font-size:14px;}
  .toolbar input[type=number]{
    width:64px;
    padding:5px 6px;
    border:1px solid #000;
    font-family:inherit;
    font-size:14px;
  }
  .btn{
    background:#fff;
    border:1.5px solid #000;
    color:#000;
    padding:7px 16px;
    font-size:14px;
    font-family:inherit;
    cursor:pointer;
    border-radius:3px;
  }
  .btn:hover{background:#000;color:#fff;}
  .tabbar{
    background:#f3f3f3;
    border-bottom:2px solid #000;
    padding:8px 10px 0 10px;
    display:flex;
    flex-wrap:wrap;
    gap:4px;
    position:sticky;
    top:64px;
    z-index:49;
    max-height:120px;
    overflow-y:auto;
  }
  .tabbtn{
    background:#ddd;
    border:1px solid #000;
    border-bottom:none;
    padding:6px 14px;
    font-size:13px;
    font-family:inherit;
    cursor:pointer;
    border-radius:4px 4px 0 0;
    margin-bottom:0;
  }
  .tabbtn.active{
    background:#fff;
    font-weight:bold;
  }
  #setsContainer{
    padding:20px;
    display:flex;
    justify-content:center;
  }
  .worksheet{display:none;}
  .worksheet.active{display:block;}
  .page{
    background:#fff;
    width:210mm;
    min-height:296mm;
    padding:14mm 14mm;
    border:1px solid #999;
    box-shadow:0 0 10px rgba(0,0,0,0.15);
  }
  .ws-header{text-align:center;border-bottom:3px solid #000;padding-bottom:8px;margin-bottom:10px;}
  .ws-title{font-size:20px;font-weight:bold;letter-spacing:0.5px;}
  .ws-sub{font-size:15px;margin-top:2px;font-weight:bold;}
  .ws-fields{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    margin-top:10px;
    flex-wrap:wrap;
    gap:6px;
  }
  .ws-fields span{border-bottom:1px solid #000;padding:0 4px 2px 4px;min-width:120px;display:inline-block;}
  .section{margin:16px 0 22px 0;}
  .section h2{
    font-size:14.5px;
    background:#000;
    color:#fff;
    padding:4px 8px;
    margin:0 0 8px 0;
    display:inline-block;
  }
  .section .instr{font-size:12.5px;color:#000;font-style:italic;margin:0 0 6px 0;}
  .seqline{font-size:15px;margin:6px 0;letter-spacing:1px;font-family:Arial, sans-serif;}
  .seqline .qn{font-weight:bold;margin-right:6px;}
  table.wstable{width:100%;border-collapse:collapse;margin:6px 0;}
  table.wstable td, table.wstable th{
    border:1.4px solid #000;
    padding:6px 8px;
    vertical-align:middle;
    font-size:13px;
  }
  table.wstable td.rownum{width:26px;text-align:center;font-weight:bold;}
  .objcell{display:flex;flex-wrap:wrap;gap:3px;align-items:center;}
  .icon-wrap{position:relative;display:inline-block;line-height:0;}
  .crossout{position:absolute;top:0;left:0;}
  .ansbox{
    display:inline-block;
    border:2px solid #000;
    width:46px;
    height:36px;
    vertical-align:middle;
  }
  .ansbox.small{width:34px;height:30px;}
  .dashedbox{
    display:inline-block;
    border:2px dashed #000;
    width:42px;
    height:42px;
    vertical-align:middle;
  }
  .opsym{font-size:20px;font-weight:bold;margin:0 6px;}
  .eqcell{display:flex;align-items:center;flex-wrap:wrap;gap:2px;}
  .compcell{display:flex;align-items:center;gap:10px;}
  .compbox{display:inline-block;border:2px solid #000;width:34px;height:34px;}
  .blankline{display:inline-block;border-bottom:1.4px solid #000;width:50px;margin:0 4px;}
  .matchwrap{display:flex;justify-content:space-between;gap:30px;}
  .matchcol{flex:1;}
  .matchitem{display:flex;align-items:center;gap:10px;margin:14px 0;font-size:13px;}
  .matchitem .dot{width:10px;height:10px;border:1.4px solid #000;border-radius:50%;background:#fff;}
  .matchitem.right{justify-content:flex-end;}
  .objline{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;}
  .objitem{display:flex;flex-direction:column;align-items:center;font-size:11.5px;gap:2px;}
  .sizebox-row{display:flex;gap:18px;align-items:flex-end;}
  .sizebox{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .numbox{width:30px;height:26px;border:2px solid #000;}
  .compare-row{display:flex;align-items:flex-end;gap:24px;justify-content:center;}
  .compare-cell{border:1.4px solid #000;padding:8px 14px;display:flex;align-items:flex-end;justify-content:center;min-width:90px;min-height:90px;}
  .ws-footer{margin-top:18px;border-top:1.4px solid #000;padding-top:6px;font-size:11px;text-align:center;color:#333;}

  @media print{
    body{background:#fff;}
    .no-print{display:none !important;}
    #setsContainer{padding:0;display:block;}
    .page{box-shadow:none;border:none;width:auto;min-height:0;padding:8mm 10mm;}
    .worksheet{display:none;}
    .worksheet.active{display:block;}
  }
  @page{size:A4;margin:8mm;}
</style>
</head>
<body>

  <div class="toolbar no-print">
    <h1>Class 2 — Math Worksheet Generator (FLN)</h1>
    <label>Number of sets:
      <input type="number" id="setCount" min="1" max="100" value="5">
    </label>
    <button class="btn" id="generateBtn">Generate</button>
    <button class="btn" id="printBtn">Print current set</button>
    <span style="font-size:12px;color:#555;">All worksheets are black &amp; white, ready to print on A4.</span>
  </div>

  <div class="tabbar no-print" id="tabbar"></div>

  <div id="setsContainer"></div>

<script>
/* ============================================================
   UTILITIES
   ============================================================ */
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function sample(arr,n){ return shuffle(arr).slice(0,n); }
function pick(arr){ return arr[randInt(0,arr.length-1)]; }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
let uidCounter = 1;
function nextUid(){ return uidCounter++; }

/* ============================================================
   SVG ICON LIBRARY  (all monochrome: black strokes, white fill)
   ============================================================ */
function svgWrap(inner, size){
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">'+inner+'</svg>';
}
function starPoints(cx,cy,outerR,innerR,n){
  const pts=[];
  for(let i=0;i<n*2;i++){
    const r = i%2===0 ? outerR : innerR;
    const angle = (Math.PI/n)*i - Math.PI/2;
    pts.push((cx+r*Math.cos(angle)).toFixed(1)+','+(cy+r*Math.sin(angle)).toFixed(1));
  }
  return pts.join(' ');
}

const ICONS = {
  apple:(size)=> svgWrap(
    '<path d="M50,32 C25,28 12,52 22,74 C30,90 44,94 50,94 C56,94 70,90 78,74 C88,52 75,28 50,32 Z" fill="#fff" stroke="#000" stroke-width="3"/>'+
    '<path d="M50,32 C47,22 53,14 60,10" fill="none" stroke="#000" stroke-width="3"/>'+
    '<path d="M60,12 C68,7 76,13 70,20 C63,23 58,18 60,12 Z" fill="#fff" stroke="#000" stroke-width="2"/>'
  , size),

  star:(size)=> svgWrap('<polygon points="'+starPoints(50,50,42,18,5)+'" fill="#fff" stroke="#000" stroke-width="3"/>', size),

  flower:(size)=> svgWrap(
    [0,60,120,180,240,300].map(a=>'<ellipse cx="50" cy="28" rx="11" ry="18" fill="#fff" stroke="#000" stroke-width="2.5" transform="rotate('+a+' 50 50)"/>').join('')+
    '<circle cx="50" cy="50" r="13" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    '<circle cx="44" cy="46" r="2" fill="#000"/><circle cx="56" cy="46" r="2" fill="#000"/><circle cx="50" cy="56" r="2" fill="#000"/>'
  , size),

  butterfly:(size)=> svgWrap(
    '<path d="M50,40 C30,10 0,15 8,40 C2,58 28,55 50,42 Z" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    '<path d="M50,40 C70,10 100,15 92,40 C98,58 72,55 50,42 Z" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    '<path d="M50,45 C34,60 12,62 16,78 C20,90 38,82 50,60 Z" fill="#fff" stroke="#000" stroke-width="2"/>'+
    '<path d="M50,45 C66,60 88,62 84,78 C80,90 62,82 50,60 Z" fill="#fff" stroke="#000" stroke-width="2"/>'+
    '<ellipse cx="50" cy="50" rx="3.5" ry="24" fill="#000"/>'+
    '<path d="M48,28 C44,18 38,16 34,10" fill="none" stroke="#000" stroke-width="2"/>'+
    '<path d="M52,28 C56,18 62,16 66,10" fill="none" stroke="#000" stroke-width="2"/>'
  , size),

  leaf:(size)=> svgWrap(
    '<path d="M50,12 C78,28 84,62 50,92 C16,62 22,28 50,12 Z" fill="#fff" stroke="#000" stroke-width="3"/>'+
    '<path d="M50,18 L50,86" stroke="#000" stroke-width="1.5"/>'+
    '<path d="M50,35 L34,28 M50,35 L66,28 M50,55 L32,50 M50,55 L68,50 M50,72 L38,70 M50,72 L62,70" fill="none" stroke="#000" stroke-width="1.2"/>'
  , size),

  fish:(size)=> svgWrap(
    '<ellipse cx="42" cy="52" rx="32" ry="20" fill="#fff" stroke="#000" stroke-width="3"/>'+
    '<path d="M72,52 L96,34 L96,70 Z" fill="#fff" stroke="#000" stroke-width="3"/>'+
    '<path d="M38,32 L50,16 L56,36 Z" fill="#fff" stroke="#000" stroke-width="2"/>'+
    '<circle cx="24" cy="46" r="3.5" fill="#000"/>'+
    '<path d="M16,58 Q24,64 32,58" fill="none" stroke="#000" stroke-width="1.5"/>'
  , size),

  pencil:(size)=> svgWrap(

    '<rect x="0" y="42" width="8" height="16" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    '<line x1="34" y1="42" x2="34" y2="58" stroke="#000" stroke-width="1.5"/>'+
    '<line x1="86" y1="46" x2="86" y2="54" stroke="#000" stroke-width="1.2"/>'

  candle:(size)=> svgWrap(

    '<line x1="50" y1="35" x2="50" y2="22" stroke="#000" stroke-width="2"/>'+

  tree:(size)=> svgWrap(

    '<rect x="44" y="78" width="12" height="16" fill="#fff" stroke="#000" stroke-width="3"/>'
  , size),

  pumpkin:(size)=> svgWrap(
    '<path d="M50,30 C25,30 18,55 25,72 C32,90 68,90 75,72 C82,55 75,30 50,30 Z" fill="#fff" stroke="#000" stroke-width="3"/>'+
    '<path d="M35,32 C32,52 32,72 38,88 M50,30 C48,52 48,72 50,90 M65,32 C68,52 68,72 62,88" fill="none" stroke="#000" stroke-width="1.5"/>'+
    '<rect x="46" y="16" width="8" height="14" fill="#fff" stroke="#000" stroke-width="2.5"/>'
  , size),

  balloon:(size)=> svgWrap(
    '<ellipse cx="50" cy="38" rx="28" ry="32" fill="#fff" stroke="#000" stroke-width="3"/>'+
    '<path d="M46,70 L54,70 L50,80 Z" fill="#fff" stroke="#000" stroke-width="2"/>'+

  giraffe:(size)=> svgWrap(
    '<path d="M40,10 C36,10 34,14 35,18 L40,40 L34,40 L40,46 L46,46 L50,20 C50,14 46,10 40,10 Z" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    '<ellipse cx="40" cy="12" rx="6" ry="5" fill="#fff" stroke="#000" stroke-width="2"/>'+
    '<path d="M38,46 C30,50 26,60 28,72 C18,72 16,84 24,90 L60,90 C70,84 66,72 56,72 C58,60 54,50 46,46 Z" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    '<line x1="30" y1="78" x2="30" y2="90" stroke="#000" stroke-width="2.5"/>'+
    '<line x1="40" y1="80" x2="40" y2="90" stroke="#000" stroke-width="2.5"/>'+
    '<line x1="50" y1="78" x2="50" y2="90" stroke="#000" stroke-width="2.5"/>'+
    '<circle cx="38" cy="20" r="2" fill="#000"/><circle cx="38" cy="55" r="2" fill="#000"/>'+
    '<circle cx="48" cy="60" r="2" fill="#000"/><circle cx="44" cy="70" r="2" fill="#000"/>'
  , size),

  glassWater:(size, opts)=>{
    const level = (opts && typeof opts.level==='number') ? opts.level : 0.5;
    const uid = nextUid();
    const topY = 90 - (90-15)*level;
    let hatch='';
    for(let i=0;i<22;i++){
      const x = i*9-60;
      hatch += '<line x1="'+x+'" y1="100" x2="'+(x+30)+'" y2="0" stroke="#000" stroke-width="1"/>';
    }
    return svgWrap(
      '<defs><clipPath id="gw'+uid+'"><path d="M30,15 L70,15 L62,90 L38,90 Z"/></clipPath></defs>'+
      '<g clip-path="url(#gw'+uid+')"><rect x="20" y="'+topY+'" width="60" height="90" fill="#fff"/>'+hatch+'</g>'+
      '<path d="M30,15 L70,15 L62,90 L38,90 Z" fill="none" stroke="#000" stroke-width="3"/>'+
      '<line x1="30" y1="15" x2="70" y2="15" stroke="#000" stroke-width="2"/>'
    , size);
  },

  /* basic geometric outlines for matching + patterns */
  circle:(size)=> svgWrap('<circle cx="50" cy="50" r="38" fill="#fff" stroke="#000" stroke-width="3.5"/>', size),
  triangle:(size)=> svgWrap('<polygon points="50,12 90,88 10,88" fill="#fff" stroke="#000" stroke-width="3.5"/>', size),
  square:(size)=> svgWrap('<rect x="14" y="14" width="72" height="72" fill="#fff" stroke="#000" stroke-width="3.5"/>', size),
  rectangle:(size)=> svgWrap('<rect x="6" y="28" width="88" height="44" fill="#fff" stroke="#000" stroke-width="3.5"/>', size),
  oval:(size)=> svgWrap('<ellipse cx="50" cy="50" rx="44" ry="26" fill="#fff" stroke="#000" stroke-width="3.5"/>', size),
  heart:(size)=> svgWrap('<path d="M50,85 C20,60 5,35 25,18 C38,8 50,18 50,30 C50,18 62,8 75,18 C95,35 80,60 50,85 Z" fill="#fff" stroke="#000" stroke-width="3.5"/>', size),

  /* vehicles */
  car:(size)=> svgWrap(

    '<circle cx="74" cy="74" r="8" fill="#fff" stroke="#000" stroke-width="3"/>'

  bicycle:(size)=> svgWrap(
    '<circle cx="22" cy="68" r="18" fill="none" stroke="#000" stroke-width="3"/>'+
    '<circle cx="78" cy="68" r="18" fill="none" stroke="#000" stroke-width="3"/>'+

    '<line x1="34" y1="18" x2="48" y2="18" stroke="#000" stroke-width="3"/>'
  , size),
  train:(size)=> svgWrap(
    '<rect x="14" y="28" width="60" height="42" rx="4" fill="#fff" stroke="#000" stroke-width="3"/>'+
    '<rect x="22" y="36" width="14" height="14" fill="#fff" stroke="#000" stroke-width="1.5"/>'+
    '<rect x="44" y="36" width="14" height="14" fill="#fff" stroke="#000" stroke-width="1.5"/>'+
    '<rect x="76" y="40" width="12" height="20" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    '<circle cx="26" cy="76" r="7" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    '<circle cx="50" cy="76" r="7" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    '<circle cx="70" cy="76" r="7" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    '<rect x="18" y="14" width="10" height="14" fill="#fff" stroke="#000" stroke-width="2"/>'
  , size),
  auto:(size)=> svgWrap(
    '<path d="M14,72 L14,46 C14,36 22,30 32,30 L62,30 C70,30 76,36 76,46 L76,72" fill="#fff" stroke="#000" stroke-width="3"/>'+

    '<circle cx="64" cy="78" r="8" fill="#fff" stroke="#000" stroke-width="3"/>'
  , size),

  /* named flowers */
  tulip:(size)=> svgWrap(
    '<path d="M35,55 C30,30 38,12 50,28 C62,12 70,30 65,55 C56,46 44,46 35,55 Z" fill="#fff" stroke="#000" stroke-width="3"/>'+
    '<line x1="50" y1="55" x2="50" y2="92" stroke="#000" stroke-width="3"/>'+
    '<path d="M50,75 C40,72 34,80 38,88" fill="none" stroke="#000" stroke-width="2.5"/>'

  rose:(size)=> svgWrap(

  sunflower:(size)=> svgWrap(
    Array.from({length:12},(_,i)=>'<ellipse cx="50" cy="20" rx="6" ry="16" fill="#fff" stroke="#000" stroke-width="2" transform="rotate('+(i*30)+' 50 50)"/>').join('')+

  daisy:(size)=> svgWrap(

  lotus:(size)=> svgWrap(
    [-40,-20,0,20,40].map(a=>'<path d="M50,70 C42,40 46,20 50,12 C54,20 58,40 50,70 Z" fill="#fff" stroke="#000" stroke-width="2.2" transform="rotate('+a+' 50 70)"/>').join('')+
    '<path d="M20,82 C35,75 65,75 80,82" fill="none" stroke="#000" stroke-width="2.5"/>'
  , size),

  /* base-ten manipulatives */
  rod:(size)=> svgWrap(
    '<rect x="32" y="6" width="36" height="88" fill="#fff" stroke="#000" stroke-width="3"/>'+
    Array.from({length:9},(_,i)=>'<line x1="32" y1="'+(6+(i+1)*8.8)+'" x2="68" y2="'+(6+(i+1)*8.8)+'" stroke="#000" stroke-width="1"/>').join('')
  , size),
  unit:(size)=> svgWrap('<rect x="28" y="28" width="44" height="44" fill="#fff" stroke="#000" stroke-width="3"/>', size)
};

function renderIcon(name,size,opts){ return ICONS[name](size, opts); }

function iconWithCross(name,size,crossed){
  const ic = renderIcon(name,size);
  if(!crossed) return '<span class="icon-wrap">'+ic+'</span>';
  return '<span class="icon-wrap">'+ic+
    '<svg class="crossout" width="'+size+'" height="'+size+'" viewBox="0 0 100 100">'+
    '<line x1="6" y1="6" x2="94" y2="94" stroke="#000" stroke-width="9"/>'+
    '<line x1="94" y1="6" x2="6" y2="94" stroke="#000" stroke-width="9"/></svg></span>';
}

/* ============================================================
   DATA POOLS
   ============================================================ */
const COUNT_ICONS = ['apple','star','flower','butterfly','leaf','fish','pencil','balloon','pumpkin'];
const SIZE_OBJECTS = ['pencil','candle','tree','fish','leaf','pumpkin'];
const SIZE_PLURAL = {pencil:'pencils',candle:'candles',tree:'trees',fish:'fish',leaf:'leaves',pumpkin:'pumpkins'};
const SIZE_ORIENT = {pencil:'horizontal',candle:'vertical',tree:'vertical',fish:'horizontal',leaf:'horizontal',pumpkin:'vertical'};
const COMPARE_OBJECTS = ['giraffe','candle','balloon','pumpkin','glassWater','apple','tree','pencil'];
const PATTERN_SHAPES = ['triangle','square','circle','star','heart'];
const MATCH_SHAPES = [['circle','Circle'],['triangle','Triangle'],['square','Square'],['rectangle','Rectangle'],['oval','Oval']];
const MATCH_OBJECTS = ['Coin','Traffic Sign','Chessboard','Book','Balloon'];
const VEHICLES = [['car','Car'],['bus','Bus'],['bicycle','Bicycle'],['train','Train'],['auto','Auto']];
const FLOWERS_NAMED = [['tulip','Tulip'],['lotus','Lotus'],['rose','Rose'],['sunflower','Sunflower'],['daisy','Daisy']];

/* ============================================================
   SECTION BUILDERS
   ============================================================ */
function section1(){
  const ranges = [[1,10],[11,20],[21,30],[31,40],[41,50]];
  let out='';
  ranges.forEach((r,idx)=>{
    const nums=[]; for(let n=r[0]; n<=r[1]; n++) nums.push(n);
    const blankPositions = sample([...Array(nums.length).keys()],3);
    const display = nums.map((n,i)=> blankPositions.includes(i) ? '____' : n).join('&nbsp;&nbsp;');
    out += '<div class="seqline"><span class="qn">'+(idx+1)+'.</span>'+display+'</div>';
  });
  return out;
}

function section2(){
  const icons = sample(COUNT_ICONS,5);
  let rows='';
  icons.forEach((icon,i)=>{
    const count = randInt(3,15);
    let imgs=''; for(let k=0;k<count;k++) imgs += renderIcon(icon,26);
    rows += '<tr><td class="rownum">'+(i+1)+'</td><td><div class="objcell">'+imgs+'</div></td><td style="width:60px;text-align:center;"><span class="ansbox"></span></td></tr>';
  });
  return '<table class="wstable"><tr><th style="width:26px;">#</th><th>Count the objects</th><th style="width:60px;">Write the number</th></tr>'+rows+'</table>';
}

function section3(){
  let out='';
  const A = randInt(2,49);
  out += '<div class="seqline"><span class="qn">1.</span> ____ , '+A+' &nbsp;(before)</div>';
  const B = randInt(1,49);
  out += '<div class="seqline"><span class="qn">2.</span> '+B+' , ____ &nbsp;(after)</div>';
  const C = randInt(1,48);
  out += '<div class="seqline"><span class="qn">3.</span> '+C+' , ____ , '+(C+2)+' &nbsp;(between)</div>';
  const D = randInt(2,48);
  out += '<div class="seqline"><span class="qn">4.</span> ____ , '+D+' , '+(D+1)+' &nbsp;(between)</div>';
  const E = randInt(1,47);
  out += '<div class="seqline"><span class="qn">5.</span> '+E+' , '+(E+1)+' , ____ &nbsp;(after)</div>';
  return out;
}

function section4(){
  const syms = shuffle(['<','>','=','<','>']);
  let out='';
  syms.forEach((sym,i)=>{
    let left,right;
    if(sym==='='){ left = randInt(1,50); right = left; }
    else if(sym==='<'){ left = randInt(1,48); right = randInt(left+1,50); }
    else { left = randInt(2,50); right = randInt(1,left-1); }
    out += '<div class="seqline"><span class="qn">'+(i+1)+'.</span> '+left+' <span class="compbox" style="vertical-align:middle;"></span> '+right+'</div>';
  });
  return out;
}

function section5(){
  const objs = sample(SIZE_OBJECTS,5);
  let rows='';
  objs.forEach((obj,i)=>{
    const orient = SIZE_ORIENT[obj];
    const word = orient==='vertical' ? 'tallest' : 'longest';
    const instr = 'Arrange the 4 '+SIZE_PLURAL[obj]+' from shortest to '+word+'.';
    const scales = shuffle([0.5,0.68,0.84,1.0]);
    let cells='';
    scales.forEach(s=>{
      const sz = Math.round(70*s);
      cells += '<div class="sizebox"><div style="height:74px;display:flex;align-items:flex-end;">'+renderIcon(obj,sz)+'</div><span class="numbox"></span></div>';
    });
    rows += '<tr><td class="rownum">'+(i+1)+'</td><td>'+instr+'</td><td><div class="sizebox-row">'+cells+'</div></td></tr>';
  });
  return '<table class="wstable"><tr><th style="width:26px;">#</th><th style="width:30%;">Instruction</th><th>Arrange and number 1–4</th></tr>'+rows+'</table>';
}

function section6(){
  const icons = sample(COUNT_ICONS,5);
  let rows='';
  icons.forEach((icon,i)=>{
    const a = randInt(1,9), b = randInt(1,9);
    let imgsA=''; for(let k=0;k<a;k++) imgsA+=renderIcon(icon,22);
    let imgsB=''; for(let k=0;k<b;k++) imgsB+=renderIcon(icon,22);
    rows += '<tr><td class="rownum">'+(i+1)+'</td><td><div class="eqcell">'+
      '<div class="objcell">'+imgsA+'</div><span class="opsym">+</span>'+
      '<div class="objcell">'+imgsB+'</div><span class="opsym">=</span>'+
      '<span class="ansbox"></span></div></td></tr>';
  });
  return '<table class="wstable"><tr><th style="width:26px;">#</th><th>Add and write the answer</th></tr>'+rows+'</table>';
}

function section7(){
  const icons = sample(COUNT_ICONS,5);
  let rows='';
  icons.forEach((icon,i)=>{
    const total = randInt(5,9);
    const crossCount = randInt(1,total-1);
    const positions = new Set(sample([...Array(total).keys()],crossCount));
    let imgs='';
    for(let k=0;k<total;k++) imgs += iconWithCross(icon,24,positions.has(k));
    rows += '<tr><td class="rownum">'+(i+1)+'</td><td><div class="eqcell">'+
      '<div class="objcell">'+imgs+'</div><span class="opsym">=</span>'+
      '<span class="ansbox"></span></div></td></tr>';
  });
  return '<p class="instr">Count all the objects, cross out the ones being subtracted, then write how many are left.</p>'+
    '<table class="wstable"><tr><th style="width:26px;">#</th><th>Subtract and write the answer</th></tr>'+rows+'</table>';
}

function tensOnesBlocks(number){
  const tens = Math.floor(number/10);
  const ones = number%10;
  let imgs='';
  for(let t=0;t<tens;t++) imgs += renderIcon('rod',34);
  for(let o=0;o<ones;o++) imgs += renderIcon('unit',22);
  return imgs;
}
function section8(){
  let rows='';
  for(let i=0;i<5;i++){
    const number = randInt(11,99);
    const reveal = i<3;
    const instr = reveal ? 'Show the number <b>'+number+'</b> using tens and ones.' : 'Look at the blocks. Write the number.';
    const blocks = tensOnesBlocks(number);
    const answer = 'Tens: <span class="blankline"></span>&nbsp;&nbsp;Ones: <span class="blankline"></span>&nbsp;&nbsp;Number: <span class="blankline" style="width:64px;"></span>';
    rows += '<tr><td class="rownum">'+(i+1)+'</td><td style="width:24%;">'+instr+'</td>'+
      '<td><div class="objcell">'+blocks+'</div></td>'+
      '<td style="width:30%;font-size:12px;">'+answer+'</td></tr>';
  }
  return '<table class="wstable"><tr><th style="width:26px;">#</th><th>Instruction</th><th>Tens and Ones blocks</th><th>Answer</th></tr>'+rows+'</table>';
}

function section9(){
  const left = shuffle(MATCH_SHAPES);
  const rightLabels = shuffle(MATCH_OBJECTS);
  let leftHtml='', rightHtml='';
  left.forEach(([key,label])=>{
    leftHtml += '<div class="matchitem"><span class="dot"></span>'+renderIcon(key,40)+'<span>'+label+'</span></div>';
  });
  rightLabels.forEach(label=>{
    rightHtml += '<div class="matchitem right"><span>'+label+'</span><span class="dot"></span></div>';
  });
  return '<p class="instr">Draw a line from each shape on the left to a matching real-life object on the right.</p>'+
    '<div class="matchwrap"><div class="matchcol">'+leftHtml+'</div><div class="matchcol">'+rightHtml+'</div></div>';
}

function buildPatternRow(){
  const types=['AB','AAB','ABB','ABC'];
  const type = pick(types);
  const lettersUsed = Array.from(new Set(type.split('')));
  const shapesChosen = sample(PATTERN_SHAPES, lettersUsed.length);
  const letterToShape={};
  lettersUsed.forEach((L,i)=> letterToShape[L]=shapesChosen[i]);
  const seq=[]; let li=0;
  while(seq.length<6){ seq.push(letterToShape[type[li % type.length]]); li++; }
  const names = shapesChosen.map(cap);
  let namesStr;
  if(names.length===2) namesStr = names[0]+' and '+names[1];
  else namesStr = names.slice(0,-1).join(', ')+' and '+names[names.length-1];
  const label = 'Continue the '+type+' pattern using '+namesStr+'.';
  return {seq,label};
}

function section10(){
  let rows='';
  for(let i=0;i<3;i++){
    const {seq,label} = buildPatternRow();
    const shapesHtml = seq.map(s=>renderIcon(s,34)).join('');
    const blanksHtml = '<span class="dashedbox"></span><span class="dashedbox"></span>';
    rows += '<tr><td class="rownum">'+(i+1)+'</td><td style="width:30%;">'+label+'</td>'+
      '<td><div class="objcell">'+shapesHtml+blanksHtml+'</div></td></tr>';
  }
  for(let i=3;i<5;i++){
    const cat = pick(['vehicle','flower']);
    const pool = cat==='vehicle' ? VEHICLES : FLOWERS_NAMED;
    const items = shuffle(pool);
    let line='';
    items.forEach(([key,label])=>{
      line += '<div class="objitem">'+renderIcon(key,38)+'<span>'+label+'</span></div>';
    });
    let question;
    if(i===3){
      const target = items[2][1];
      question = 'Which '+(cat==='vehicle'?'vehicle':'flower')+' is in the 3rd position? <span class="ansbox small"></span> &nbsp;<span style="font-size:11px;color:#555;">(answer: write its name)</span>';
    } else {
      question = 'Circle the '+(cat==='vehicle'?'vehicle':'flower')+' in the 4th position.';
    }
    rows += '<tr><td class="rownum">'+(i+1)+'</td><td colspan="2"><div class="objline">'+line+'</div><div style="margin-top:8px;font-size:13px;">'+question+'</div></td></tr>';
  }
  return '<table class="wstable"><tr><th style="width:26px;">#</th><th colspan="2">Pattern / Position</th></tr>'+rows+'</table>';
}

const COMPARE_PHRASES = {
  giraffe:{adjBig:'taller',adjSmall:'shorter',noun:'giraffe'},
  candle:{adjBig:'taller',adjSmall:'shorter',noun:'candle'},
  balloon:{adjBig:'bigger',adjSmall:'smaller',noun:'balloon'},
  pumpkin:{adjBig:'bigger',adjSmall:'smaller',noun:'pumpkin'},
  apple:{adjBig:'bigger',adjSmall:'smaller',noun:'apple'},
  tree:{adjBig:'taller',adjSmall:'shorter',noun:'tree'},
  pencil:{adjBig:'longer',adjSmall:'shorter',noun:'pencil'},
  glassWater:{adjBig:'with more water',adjSmall:'with less water',noun:'glass'}
};
function section11(){
  const objs = sample(COMPARE_OBJECTS,5);
  let rows='';
  objs.forEach((obj,i)=>{
    const cfg = COMPARE_PHRASES[obj];
    const askBig = Math.random()<0.5;
    const adj = askBig ? cfg.adjBig : cfg.adjSmall;
    const instr = obj==='glassWater' ? ('Circle the glass '+adj+'.') : ('Circle the '+adj+' '+cfg.noun+'.');
    let iconA, iconB;
    if(obj==='glassWater'){
      const levels = shuffle([0.25,0.85]);
      iconA = renderIcon(obj,72,{level:levels[0]});
      iconB = renderIcon(obj,72,{level:levels[1]});
    } else {
      const scales = shuffle([0.55,1.0]);
      iconA = renderIcon(obj,Math.round(70*scales[0]));
      iconB = renderIcon(obj,Math.round(70*scales[1]));
    }
    const order = shuffle([iconA,iconB]);
    rows += '<tr><td class="rownum">'+(i+1)+'</td><td style="width:30%;">'+instr+'</td>'+
      '<td><div class="compare-row"><div class="compare-cell">'+order[0]+'</div><div class="compare-cell">'+order[1]+'</div></div></td></tr>';
  });
  return '<table class="wstable"><tr><th style="width:26px;">#</th><th>Instruction</th><th>Compare</th></tr>'+rows+'</table>';
}

/* ============================================================
   WORKSHEET ASSEMBLY
   ============================================================ */
const SECTION_TITLES = [
  'Section 1 — Fill in the Missing Numbers',
  'Section 2 — Count the Objects and Write the Numeral',
  'Section 3 — Before, After, Between',
  'Section 4 — Compare the Numbers ( &lt; , &gt; , = )',
  'Section 5 — Size Ordering',
  'Section 6 — Addition',
  'Section 7 — Subtraction',
  'Section 8 — Tens and Ones',
  'Section 9 — Match the Shapes',
  'Section 10 — Complete the Pattern',
  'Section 11 — Compare the Objects'
];

function buildWorksheetHTML(setNum){
  const builders = [section1,section2,section3,section4,section5,section6,section7,section8,section9,section10,section11];
  let sectionsHtml='';
  builders.forEach((fn,idx)=>{
    sectionsHtml += '<div class="section"><h2>'+SECTION_TITLES[idx]+'</h2>'+fn()+'</div>';
  });
  return '<div class="page">'+
    '<div class="ws-header">'+
      '<div class="ws-title">CLASS 2 — MATHEMATICS PRACTICE WORKSHEET</div>'+
      '<div class="ws-sub">Set '+setNum+'</div>'+
      '<div class="ws-fields"><span>Name:</span><span>Date:</span><span>Roll No.:</span><span>Marks: ____ / 100</span></div>'+
    '</div>'+
    sectionsHtml+
    '<div class="ws-footer">Class 2 — Math FLN Practice &nbsp;|&nbsp; Set '+setNum+'</div>'+
  '</div>';
}

/* ============================================================
   APP LOGIC (tabs, lazy render, print)
   ============================================================ */
let worksheetHTMLs = [];
let inserted = [];

function generateSets(n){
  n = Math.max(1, Math.min(100, n|0));
  worksheetHTMLs = [];
  for(let i=0;i<n;i++) worksheetHTMLs.push(buildWorksheetHTML(i+1));
  inserted = new Array(n).fill(false);

  const tabbar = document.getElementById('tabbar');
  tabbar.innerHTML = '';
  for(let i=1;i<=n;i++){
    const btn = document.createElement('button');
    btn.className = 'tabbtn';
    btn.id = 'tabbtn-'+i;
    btn.textContent = 'Set '+i;
    btn.addEventListener('click', ()=> activateSet(i));
    tabbar.appendChild(btn);
  }

  const container = document.getElementById('setsContainer');
  container.innerHTML = '';
  for(let i=1;i<=n;i++){
    const div = document.createElement('div');
    div.className = 'worksheet';
    div.id = 'ws-'+i;
    container.appendChild(div);
  }
  activateSet(1);
}

function activateSet(num){
  document.querySelectorAll('.worksheet').forEach(w=>w.classList.remove('active'));
  document.querySelectorAll('.tabbtn').forEach(b=>b.classList.remove('active'));
  const div = document.getElementById('ws-'+num);
  if(!div) return;
  if(!inserted[num-1]){
    div.innerHTML = worksheetHTMLs[num-1];
    inserted[num-1] = true;
  }
  div.classList.add('active');
  const btn = document.getElementById('tabbtn-'+num);
  if(btn) btn.classList.add('active');
}

document.getElementById('generateBtn').addEventListener('click', ()=>{
  const n = parseInt(document.getElementById('setCount').value, 10) || 1;
  generateSets(n);
});
document.getElementById('printBtn').addEventListener('click', ()=> window.print());

generateSets(parseInt(document.getElementById('setCount').value,10) || 5);
</script>
